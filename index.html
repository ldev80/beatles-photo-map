<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evolver '62</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&family=Jost:wght@300;500;700&display=swap"/>
<style>
  @font-face {
    font-family: 'Futura';
    src: url('fonts/FuturaStd-Light.otf') format('opentype');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Futura';
    src: url('fonts/FuturaStd-Medium.otf') format('opentype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Futura';
    src: url('fonts/FuturaStd-Bold.otf') format('opentype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:     #1d1d1d;
    --bg:      #c2d3e3;
    --surface: #ffffff;
    --border:  rgba(29,29,29,0.14);
    --muted:   rgba(29,29,29,0.45);

    --font-ui:   'Futura', 'Jost', sans-serif;
    --font-body: 'EB Garamond', serif;
  }

  html, body {
    height: 100%;
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
  }

  #shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #topbar {
    background: var(--ink);
    color: var(--bg);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  #topbar h1 {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--bg);
  }

  #topbar .sub {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.35em;
    color: rgba(194,211,227,0.5);
  }

  .badge {
    font-family: var(--font-ui);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    background: rgba(194,211,227,0.12);
    color: rgba(194,211,227,0.8);
    border: 1px solid rgba(194,211,227,0.2);
  }

  #topbar .spacer { flex: 1; }

  #topbar .gh-link {
    font-family: var(--font-ui);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(194,211,227,0.5);
    text-decoration: none;
    border: 1px solid rgba(194,211,227,0.2);
    padding: 4px 10px;
    border-radius: 2px;
    transition: border-color 0.2s, color 0.2s;
  }

  #topbar .gh-link:hover { color: var(--bg); border-color: rgba(194,211,227,0.6); }

  #body {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  #map {
    flex: 1;
    min-width: 0;
    z-index: 0;
  }

  #panel {
    width: 320px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg);
    overflow: hidden;
  }

  #photo-wrap {
    width: 100%;
    aspect-ratio: 4/3;
    background: #1a1612;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(20%);
    transition: opacity 0.3s;
  }

  #photo-wrap .no-img {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(194,211,227,0.4);
    text-align: center;
    padding: 24px;
    line-height: 2;
  }

  .photo-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.45);
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.15s;
  }

  .photo-nav:hover { background: rgba(0,0,0,0.7); }
  #photo-prev { left: 8px; }
  #photo-next { right: 8px; }

  #photo-counter {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 8px;
    border-radius: 10px;
    display: none;
    z-index: 10;
    white-space: nowrap;
  }

  #meta {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #meta .m-date {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.5;
    margin-bottom: 5px;
  }

  #meta .m-title {
    font-family: var(--font-ui);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.25;
    margin-bottom: 4px;
  }

  #meta .m-loc {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  #meta .m-desc {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: var(--ink);
    line-height: 1.65;
    margin-bottom: 10px;
  }

  #meta .m-src a {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.45;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  #meta .m-src a:hover { opacity: 1; }

  #list-head {
    padding: 10px 16px;
    font-family: var(--font-ui);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #list {
    flex: 1;
    overflow-y: auto;
  }

  #list::-webkit-scrollbar { width: 3px; }
  #list::-webkit-scrollbar-track { background: transparent; }
  #list::-webkit-scrollbar-thumb { background: rgba(29,29,29,0.2); border-radius: 2px; }

  .entry {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: background 0.1s;
  }

  .entry:hover { background: rgba(255,255,255,0.35); }

  .entry.active {
    background: var(--surface);
    border-left: 4px solid var(--ink);
    padding-left: 12px;
  }

  .e-date {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
    text-align: right;
    white-space: nowrap;
    flex-shrink: 0;
    width: 32px;
    line-height: 1.6;
  }

  .e-title {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.03em;
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .e-loc {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.03em;
    color: var(--muted);
  }

  .e-camera {
    margin-left: auto;
    flex-shrink: 0;
    color: var(--ink);
    opacity: 0.4;
    margin-top: 2px;
  }

  #tl-bar {
    border-top: 1px solid var(--border);
    background: var(--bg);
    padding: 12px 20px 14px;
    flex-shrink: 0;
  }

  #tl-wrap {
    position: relative;
    height: 32px;
    margin: 0 8px;
    cursor: pointer;
  }

  #tl-bg {
    position: absolute;
    top: 14px;
    left: 0; right: 0;
    height: 1px;
    background: rgba(29,29,29,0.2);
    border-radius: 1px;
  }

  #tl-prog {
    position: absolute;
    top: 14px;
    left: 0;
    height: 1px;
    background: var(--ink);
    border-radius: 1px;
    transition: width 0.25s;
  }

  #tl-thumb {
    position: absolute;
    top: 7px;
    width: 18px;
    height: 18px;
    background: var(--ink);
    border-radius: 50%;
    transform: translateX(-50%);
    cursor: grab;
    border: 2px solid var(--bg);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    z-index: 3;
    transition: left 0.25s;
  }

  #tl-thumb:active { cursor: grabbing; }

  .tl-pip {
    position: absolute;
    top: 11px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(29,29,29,0.25);
    transform: translateX(-50%);
    cursor: pointer;
    z-index: 2;
    border: 1.5px solid var(--bg);
    transition: background 0.15s, transform 0.15s;
  }

  .tl-pip:hover { background: rgba(29,29,29,0.6); transform: translateX(-50%) scale(1.4); }
  .tl-pip.active { background: var(--ink); }

  #tl-years {
    display: flex;
    justify-content: space-between;
    padding: 0 8px;
    margin-top: 4px;
  }

  #tl-years span {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--muted);
  }

  #tl-label {
    text-align: center;
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
    margin-top: 5px;
    min-height: 16px;
  }

  .leaflet-container { font-family: 'IBM Plex Sans', sans-serif; }

</style>
</head>

        <img id="photo-img" alt="" style="display:none"/>
        <button id="photo-prev" class="photo-nav" aria-label="Previous photo">&#8592;</button>
        <button id="photo-next" class="photo-nav" aria-label="Next photo">&#8594;</button>
        <div id="photo-counter"></div>
      </div>
      <div id="meta">
        <div class="m-date" id="m-date"></div>
        <div class="m-title" id="m-title">No photo selected</div>
        <div class="m-loc" id="m-loc"></div>
        <div class="m-desc" id="m-desc"></div>
        <div class="m-src" id="m-src"></div>
      </div>
      <div id="list-head">All entries — <span id="count">0</span> events</div>
      <div id="list"></div>
    </div>
  </div>

  <div id="tl-bar">
    <div id="tl-wrap">
      <div id="tl-bg"></div>
      <div id="tl-prog"></div>
      <div id="tl-thumb"></div>
    </div>
    <div id="tl-years">
      <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span><span>Jul</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span>
    </div>
    <div id="tl-label"></div>
  </div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getFirestore, collection, collectionGroup, getDocs } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

// ── Firebase ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBYNSAGPpD9UT7syoS0Wgvt2dKeMCYSzD0",
  authDomain: "beatles-photo-map.firebaseapp.com",
  projectId: "beatles-photo-map",
  storageBucket: "beatles-photo-map.appspot.com"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── Fallback data (used if Firestore is empty) ────────────
const FALLBACK = [
  {id:'f1',venue:"St Peter's Church fete",city:"Woolton, Liverpool",date:"1957-07-06",lat:53.3739,lng:-2.8742,desc:"John Lennon's skiffle group perform at the church fete where he first met Paul McCartney.",source:"https://www.beatlesbible.com/1957/07/06/the-quarrymen-st-peters-church-fete-woolton/"},
  {id:'f2',venue:"New Clubmoor Hall",city:"Liverpool",date:"1957-11-23",lat:53.4308,lng:-2.9671,desc:"Early Quarrymen performance. Paul McCartney's first appearance with the group on stage.",source:"https://www.beatlesbible.com/1957/11/23/"},
  {id:'f3',venue:"Harry Harrison's wedding",city:"Speke, Liverpool",date:"1958-12-20",lat:53.3477,lng:-2.8495,desc:"The Quarrymen play at George Harrison's brother Harry's wedding reception.",source:"https://www.beatlesbible.com/1958/12/20/"},
  {id:'f4',venue:"Casbah Coffee Club",city:"West Derby, Liverpool",date:"1959-08-29",lat:53.4284,lng:-2.9018,desc:"The opening night of the Casbah Coffee Club, run by Mona Best in her basement.",source:"https://www.beatlesbible.com/1959/08/29/"},
  {id:'f5',venue:"Wyvern Social Club",city:"Seel Street, Liverpool",date:"1960-05-10",lat:53.4007,lng:-2.9773,desc:"The Silver Beetles audition for promoter Larry Parnes, hoping to back Billy Fury on tour.",source:"https://www.beatlesbible.com/1960/05/10/"},
  {id:'f6',venue:"Indra Club",city:"Hamburg",date:"1960-08-17",lat:53.5499,lng:9.9609,desc:"The Beatles begin their first Hamburg residency at the Indra Club on Grosse Freiheit.",source:"https://www.beatlesbible.com/1960/08/17/"},
  {id:'f7',venue:"Kaiserkeller",city:"Hamburg",date:"1960-10-04",lat:53.5497,lng:9.9611,desc:"The Beatles move from the Indra to the larger Kaiserkeller after noise complaints.",source:"https://www.beatlesbible.com/1960/10/04/"},
  {id:'f8',venue:"Hamburg Fairground",city:"Hamburg",date:"1960-11-15",lat:53.5753,lng:10.0153,desc:"Astrid Kirchherr photographs the band at a Hamburg fairground.",source:"https://www.beatlesbible.com/1960/11/15/"},
  {id:'f9',venue:"Top Ten Club",city:"Hamburg",date:"1961-04-01",lat:53.5495,lng:9.9614,desc:"Second Hamburg trip. The band play the Top Ten Club for three months.",source:"https://www.beatlesbible.com/1961/04/01/"},
  {id:'f10',venue:"Friedrich-Ebert-Halle",city:"Hamburg",date:"1961-06-22",lat:53.5024,lng:9.8507,desc:"The Beatles back Tony Sheridan on recordings for Polydor — their first commercial studio session.",source:"https://www.beatlesbible.com/1961/06/22/"},
  {id:'f11',venue:"Cavern Club",city:"Liverpool",date:"1961-09-28",lat:53.4083,lng:-2.9917,desc:"One of hundreds of Cavern Club performances in 1961.",source:"https://www.beatlesbible.com/1961/09/28/"},
  {id:'f12',venue:"Albert Marrion's Studio",city:"Liverpool",date:"1961-12-17",lat:53.4054,lng:-2.9805,desc:"Brian Epstein commissions local wedding photographer Albert Marrion for the band's first professional photo session.",source:"https://www.beatlesbible.com/1961/12/17/beatles-first-photo-session/"},
  {id:'f13',venue:"Decca Studios",city:"London",date:"1962-01-01",lat:51.5468,lng:-0.1836,desc:"The Beatles audition for Decca Records. Decca famously pass, saying 'guitar groups are on the way out.'",source:"https://www.beatlesbible.com/1962/01/01/decca-audition/"},
  {id:'f14',venue:"Star-Club",city:"Hamburg",date:"1962-04-13",lat:53.5501,lng:9.9607,desc:"The Beatles begin their final Hamburg residency at the newly opened Star-Club.",source:"https://www.beatlesbible.com/1962/04/13/"},
  {id:'f15',venue:"Abbey Road Studios",city:"London",date:"1962-06-06",lat:51.5320,lng:-0.1783,desc:"The Beatles record at EMI Studios for the first time. Pete Best is still the drummer.",source:"https://www.beatlesbible.com/1962/06/06/"}
];

// ── State ─────────────────────────────────────────────────
let events = [];
let activeId = null;
let currentPhotoIndex = 0;
let map, markers = {};
let usingFirestore = false;

// ── Time helpers ──────────────────────────────────────────
const minTs = new Date('1962-01-01').getTime();
const maxTs = new Date('1962-12-31').getTime();

function toTs(d) { return d ? new Date(d).getTime() : 0; }
function tsPct(ts) { return Math.max(0, Math.min(100, (ts - minTs) / (maxTs - minTs) * 100)); }

function stackedDate(d) {
  if (!d) return '—';
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const p = d.split('-');
  if (p.length >= 3) return `${p[2]}<br>${months[parseInt(p[1])-1]}`;
  if (p.length === 2) return months[parseInt(p[1])-1];
  return p[0];
}

function formatDate(d) {
  if (!d) return '—';
  const p = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (p.length === 1) return p[0];
  if (p.length === 2) return months[parseInt(p[1])-1] + ' ' + p[0];
  return p[2] + ' ' + months[parseInt(p[1])-1] + ' ' + p[0];
}

// ── Map ───────────────────────────────────────────────────
function makeIcon(isActive) {
  const size  = isActive ? 18 : 10;
  const color = isActive ? '#1d1d1d' : 'rgba(29,29,29,0.4)';
  const border = isActive ? '#c2d3e3' : '#c2d3e3';
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;border:2px solid ${border};box-shadow:0 2px 6px rgba(0,0,0,0.2);transition:all 0.2s"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function initMap() {
  map = L.map('map', { center: [53.2, 2.0], zoom: 6 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }).addTo(map);
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  events.forEach(p => {
    if (!p.lat || !p.lng) return;
    const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.id === activeId) }).addTo(map);
    m.bindTooltip(eventTitle(p), { direction: 'top', offset: [0, -8] });
    m.on('click', () => selectEvent(p.id));
    markers[p.id] = m;
  });
}

// ── Data helpers ──────────────────────────────────────────
function eventTitle(e) { return e.venue || e.title || '—'; }
function eventLocation(e) { return [e.venue, e.city].filter(Boolean).join(', '); }

// Map a Firestore doc snapshot to the internal event shape
function docToEvent(snapshot) {
  const d = snapshot.data();
  return {
    id: snapshot.id,
    venue: d.venue || '',
    city: d.city || '',
    date: d.date || '',
    time: d.time || '',
    lat: d.lat || 0,
    lng: d.lng || 0,
    desc: d.desc || '',
    source: d.source || '',
    _photosLoaded: false,
    _photos: [],
    _fromFirestore: true
  };
}

// ── Firestore loading ─────────────────────────────────────
async function loadFromFirestore() {
  const snap = await getDocs(collection(db, 'events'));
  if (snap.empty) return null;
  return snap.docs.map(docToEvent);
}

async function loadPhotosForEvent(eventId) {
  const snap = await getDocs(collection(db, 'events', eventId, 'photos'));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// One query to find all event IDs that have at least one photo
async function loadPhotoMembership() {
  const snap = await getDocs(collectionGroup(db, 'photos'));
  const ids = new Set();
  snap.docs.forEach(d => ids.add(d.ref.parent.parent.id));
  return ids;
}

// ── Select & display ──────────────────────────────────────
async function selectEvent(id) {
  activeId = id;
  const p = events.find(x => x.id === id);
  if (!p) return;

  // Lazy-load photos from Firestore subcollection
  if (!p._photosLoaded) {
    if (p._fromFirestore) {
      try {
        p._photos = await loadPhotosForEvent(id);
      } catch (e) {
        p._photos = [];
      }
    }
    p._photosLoaded = true;
  }

  showPhoto(p, 0);

  document.getElementById('m-date').textContent = formatDate(p.date);
  document.getElementById('m-title').textContent = eventTitle(p);
  document.getElementById('m-loc').textContent = eventLocation(p);
  document.getElementById('m-desc').textContent = p.desc || '';
  const srcEl = document.getElementById('m-src');
  srcEl.innerHTML = p.source ? `<a href="${p.source}" target="_blank">View source</a>` : '';

  const ts = toTs(p.date);
  const pct = tsPct(ts);
  document.getElementById('tl-prog').style.width = pct + '%';
  document.getElementById('tl-thumb').style.left = pct + '%';
  document.getElementById('tl-label').textContent = formatDate(p.date) + ' — ' + eventLocation(p);

  document.querySelectorAll('.entry').forEach(el => el.classList.toggle('active', el.dataset.id === id));

  renderMarkers();
  if (p.lat && p.lng) map.flyTo([p.lat, p.lng], Math.max(map.getZoom(), 9), { animate: true, duration: 0.8 });
}

// ── Photo navigation ──────────────────────────────────────
function showPhoto(p, index) {
  const photos = p._photos || [];
  currentPhotoIndex = Math.max(0, Math.min(index, photos.length - 1));
  const photo = photos[currentPhotoIndex];
  const imgUrl = photo ? (photo.img || '') : '';

  const photoImg     = document.getElementById('photo-img');
  const placeholder  = document.getElementById('photo-placeholder');
  const prevBtn      = document.getElementById('photo-prev');
  const nextBtn      = document.getElementById('photo-next');
  const counter      = document.getElementById('photo-counter');

  if (imgUrl) {
    photoImg.alt = eventTitle(p);
    photoImg.src = imgUrl;
    photoImg.style.display = 'block';
    placeholder.style.display = 'none';
    photoImg.onerror = () => {
      photoImg.style.display = 'none';
      placeholder.textContent = 'Image could not be loaded.';
      placeholder.style.display = 'flex';
    };
  } else {
    photoImg.style.display = 'none';
    placeholder.textContent = 'No image attached to this event';
    placeholder.style.display = 'flex';
  }

  const multi = photos.length > 1;
  prevBtn.style.display  = multi ? 'flex' : 'none';
  nextBtn.style.display  = multi ? 'flex' : 'none';
  counter.style.display  = multi ? 'block' : 'none';
  if (multi) counter.textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
}

document.getElementById('photo-prev').addEventListener('click', () => {
  const p = events.find(x => x.id === activeId);
  if (!p || !p._photos || p._photos.length < 2) return;
  showPhoto(p, (currentPhotoIndex - 1 + p._photos.length) % p._photos.length);
});

document.getElementById('photo-next').addEventListener('click', () => {
  const p = events.find(x => x.id === activeId);
  if (!p || !p._photos || p._photos.length < 2) return;
  showPhoto(p, (currentPhotoIndex + 1) % p._photos.length);
});

// ── Render list & timeline ────────────────────────────────
function renderList() {
  const sorted = [...events].sort((a, b) => toTs(a.date) - toTs(b.date));
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('count').textContent = events.length;
  sorted.forEach(p => {
    const div = document.createElement('div');
    div.className = 'entry' + (p.id === activeId ? ' active' : '');
    div.dataset.id = p.id;
    const cameraIcon = `<svg class="e-camera" width="13" height="13" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M2 6a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1h-3.382l-1.724-1.724A1 1 0 0 0 12.172 4H7.828a1 1 0 0 0-.707.293L5.382 6H2zm8 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>`;
    div.innerHTML = `
      <div class="e-date">${stackedDate(p.date)}</div>
      <div style="flex:1;min-width:0">
        <div class="e-title">${eventTitle(p)}</div>
        <div class="e-loc">${eventLocation(p)}</div>
      </div>
      ${p._hasPhotos ? cameraIcon : ''}`;
    div.addEventListener('click', () => selectEvent(p.id));
    list.appendChild(div);
  });
}

function renderPips() {
  document.querySelectorAll('.tl-pip').forEach(e => e.remove());
  const wrap = document.getElementById('tl-wrap');
  events.forEach(p => {
    if (!p.date) return;
    const pct = tsPct(toTs(p.date));
    const pip = document.createElement('div');
    pip.className = 'tl-pip' + (p.id === activeId ? ' active' : '');
    pip.style.left = pct + '%';
    pip.title = eventTitle(p);
    pip.addEventListener('click', () => selectEvent(p.id));
    wrap.appendChild(pip);
  });
}

function render() {
  renderList();
  renderMarkers();
  renderPips();
}

// ── Boot ──────────────────────────────────────────────────
initMap();

const badge = document.getElementById('data-badge');
try {
  const data = await loadFromFirestore();
  if (data && data.length > 0) {
    events = data;
    usingFirestore = true;
    badge.textContent = 'Firestore';
    badge.style.background = '#dcfce7';
    badge.style.color = '#166534';
    badge.style.borderColor = '#86efac';
    try {
      const photoIds = await loadPhotoMembership();
      events.forEach(e => { e._hasPhotos = photoIds.has(e.id); });
    } catch (_) {}
  } else {
    events = FALLBACK.map(p => ({ ...p, _photosLoaded: true, _fromFirestore: false }));
    badge.textContent = 'provisional data';
  }
} catch (err) {
  console.error('Firestore error:', err);
  events = FALLBACK.map(p => ({ ...p, _photosLoaded: true, _fromFirestore: false }));
  badge.textContent = 'offline / fallback';
}

render();
if (events.length) selectEvent(events[0].id);
</script>
</body>
</html>
