<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Beatles — Through the Lens</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1612;
    --cream: #F7F3EC;
    --amber: #b45309;
    --amber-light: #fef3c7;
    --amber-border: #fcd34d;
    --border: #e2ddd6;
    --muted: #6b6560;
    --surface: #ffffff;
    --bg: #f0ebe2;
  }

  html, body {
    height: 100%;
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
  }

  #shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #topbar {
    background: var(--ink);
    color: var(--cream);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    border-bottom: 2px solid var(--amber);
  }

  #topbar h1 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
    color: var(--cream);
  }

  #topbar .sub {
    font-size: 11px;
    color: #9b9690;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.5px;
  }

  .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--amber-light);
    color: #92400e;
    font-family: 'IBM Plex Mono', monospace;
    border: 1px solid var(--amber-border);
  }

  #topbar .spacer { flex: 1; }

  #topbar .gh-link {
    font-size: 11px;
    color: #9b9690;
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    border: 1px solid #3a3530;
    padding: 4px 10px;
    border-radius: 3px;
    transition: border-color 0.2s, color 0.2s;
  }

  #topbar .gh-link:hover { color: var(--cream); border-color: #9b9690; }

  #body {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  #map {
    flex: 1;
    min-width: 0;
    z-index: 0;
  }

  #panel {
    width: 300px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  #photo-wrap {
    width: 100%;
    aspect-ratio: 4/3;
    background: #1a1612;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(20%);
    transition: opacity 0.3s;
  }

  #photo-wrap .no-img {
    font-size: 12px;
    color: #6b6560;
    text-align: center;
    padding: 24px;
    line-height: 1.6;
  }

  .photo-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.45);
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.15s;
  }

  .photo-nav:hover { background: rgba(0,0,0,0.7); }
  #photo-prev { left: 8px; }
  #photo-next { right: 8px; }

  #photo-counter {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 8px;
    border-radius: 10px;
    display: none;
    z-index: 10;
    white-space: nowrap;
  }

  #meta {
    padding: 13px 15px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #meta .m-date {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--amber);
    letter-spacing: 1.5px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  #meta .m-title {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.35;
    margin-bottom: 5px;
  }

  #meta .m-loc {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 6px;
  }

  #meta .m-desc {
    font-size: 12px;
    color: #3a3530;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  #meta .m-src a {
    font-size: 11px;
    color: var(--amber);
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
  }

  #meta .m-src a:hover { text-decoration: underline; }

  #edit-btn {
    margin-top: 10px;
    font-size: 11px;
    padding: 5px 11px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    display: none;
    transition: border-color 0.15s, color 0.15s;
  }

  #edit-btn:hover { border-color: var(--amber); color: var(--amber); }

  #list-head {
    padding: 8px 15px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    flex-shrink: 0;
  }

  #list {
    flex: 1;
    overflow-y: auto;
  }

  #list::-webkit-scrollbar { width: 4px; }
  #list::-webkit-scrollbar-track { background: transparent; }
  #list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .entry {
    padding: 10px 15px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: background 0.12s;
  }

  .entry:hover { background: var(--cream); }

  .entry.active {
    background: #fef9f0;
    border-left: 3px solid var(--amber);
    padding-left: 12px;
  }

  .e-date {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--amber);
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .e-title {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .e-loc {
    font-size: 11px;
    color: var(--muted);
  }

  #tl-bar {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 20px 14px;
    flex-shrink: 0;
  }

  #tl-wrap {
    position: relative;
    height: 32px;
    margin: 0 8px;
    cursor: pointer;
  }

  #tl-bg {
    position: absolute;
    top: 14px;
    left: 0; right: 0;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
  }

  #tl-prog {
    position: absolute;
    top: 14px;
    left: 0;
    height: 2px;
    background: var(--amber);
    border-radius: 1px;
    transition: width 0.25s;
  }

  #tl-thumb {
    position: absolute;
    top: 7px;
    width: 18px;
    height: 18px;
    background: var(--amber);
    border-radius: 50%;
    transform: translateX(-50%);
    cursor: grab;
    border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    z-index: 3;
    transition: left 0.25s;
  }

  #tl-thumb:active { cursor: grabbing; }

  .tl-pip {
    position: absolute;
    top: 11px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d4cec6;
    transform: translateX(-50%);
    cursor: pointer;
    z-index: 2;
    border: 1.5px solid white;
    transition: background 0.15s, transform 0.15s;
  }

  .tl-pip:hover { background: var(--amber); transform: translateX(-50%) scale(1.4); }
  .tl-pip.active { background: var(--ink); }

  #tl-years {
    display: flex;
    justify-content: space-between;
    padding: 0 8px;
    margin-top: 4px;
  }

  #tl-years span {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
  }

  #tl-label {
    text-align: center;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--amber);
    margin-top: 5px;
    letter-spacing: 0.3px;
    min-height: 16px;
  }

  .leaflet-container { font-family: 'IBM Plex Sans', sans-serif; }

  #edit-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }

  #edit-overlay.open { display: flex; }

  #edit-box {
    background: var(--surface);
    border-radius: 8px;
    padding: 24px;
    width: 460px;
    max-width: 95vw;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  #edit-box h2 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 16px;
    font-family: 'Playfair Display', serif;
  }

  .ef { margin-bottom: 12px; }

  .ef label {
    display: block;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .ef input, .ef textarea {
    width: 100%;
    font-size: 13px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--cream);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    transition: border-color 0.15s;
  }

  .ef input:focus, .ef textarea:focus {
    outline: none;
    border-color: var(--amber);
  }

  .ef textarea { height: 72px; resize: vertical; }

  .ef-row { display: flex; gap: 10px; }
  .ef-row .ef { flex: 1; }

  .edit-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 16px;
  }

  .edit-actions button {
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    transition: opacity 0.15s;
  }

  #save-btn { background: var(--amber); color: white; border: none; }
  #save-btn:hover { opacity: 0.85; }
  #cancel-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  #cancel-btn:hover { border-color: var(--ink); color: var(--ink); }

  #json-export {
    margin-top: 12px;
    padding: 10px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    display: none;
  }

  #json-export p { margin-bottom: 6px; color: var(--ink); }
  #json-export textarea { width: 100%; height: 80px; font-size: 10px; resize: none; }
</style>
</head>
<body>

<div id="shell">
  <div id="topbar">
    <h1>The Beatles — Through the Lens</h1>
    <span class="sub">1957–1962</span>
    <span class="badge" id="data-badge">loading…</span>
    <span class="spacer"></span>
    <a class="gh-link" href="https://github.com/Ldev80/beatles-photo-map" target="_blank">Edit on GitHub</a>
  </div>

  <div id="body">
    <div id="map"></div>
    <div id="panel">
      <div id="photo-wrap">
        <div class="no-img" id="photo-placeholder">Select a photo from the list or timeline</div>
        <img id="photo-img" alt="" style="display:none"/>
        <button id="photo-prev" class="photo-nav" aria-label="Previous photo">&#8592;</button>
        <button id="photo-next" class="photo-nav" aria-label="Next photo">&#8594;</button>
        <div id="photo-counter"></div>
      </div>
      <div id="meta">
        <div class="m-date" id="m-date"></div>
        <div class="m-title" id="m-title">No photo selected</div>
        <div class="m-loc" id="m-loc"></div>
        <div class="m-desc" id="m-desc"></div>
        <div class="m-src" id="m-src"></div>
        <button id="edit-btn">Edit this entry</button>
      </div>
      <div id="list-head">All entries — <span id="count">0</span> events</div>
      <div id="list"></div>
    </div>
  </div>

  <div id="tl-bar">
    <div id="tl-wrap">
      <div id="tl-bg"></div>
      <div id="tl-prog"></div>
      <div id="tl-thumb"></div>
    </div>
    <div id="tl-years">
      <span>1957</span><span>1958</span><span>1959</span><span>1960</span><span>1961</span><span>1962</span>
    </div>
    <div id="tl-label"></div>
  </div>
</div>

<div id="edit-overlay">
  <div id="edit-box">
    <h2>Edit photo entry</h2>
    <div class="ef"><label>Title</label><input id="ef-title"/></div>
    <div class="ef-row">
      <div class="ef"><label>Date (YYYY-MM-DD)</label><input id="ef-date" placeholder="e.g. 1960-08-17"/></div>
      <div class="ef"><label>Location name</label><input id="ef-loc"/></div>
    </div>
    <div class="ef-row">
      <div class="ef"><label>Latitude</label><input id="ef-lat" type="number" step="0.0001"/></div>
      <div class="ef"><label>Longitude</label><input id="ef-lng" type="number" step="0.0001"/></div>
    </div>
    <div class="ef"><label>Image URL</label><input id="ef-img" placeholder="https://..."/></div>
    <div class="ef"><label>Source URL</label><input id="ef-src" placeholder="https://www.beatlesbible.com/..."/></div>
    <div class="ef"><label>Description</label><textarea id="ef-desc"></textarea></div>
    <div class="edit-actions">
      <button id="cancel-btn">Cancel</button>
      <button id="save-btn">Save &amp; export JSON</button>
    </div>
    <div id="json-export">
      <p>Copy the JSON below and update your <code>photos.json</code> on GitHub:</p>
      <textarea id="json-out" readonly></textarea>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getFirestore, collection, getDocs, doc, updateDoc, addDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

// ── Firebase ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBYNSAGPpD9UT7syoS0Wgvt2dKeMCYSzD0",
  authDomain: "beatles-photo-map.firebaseapp.com",
  projectId: "beatles-photo-map",
  storageBucket: "beatles-photo-map.appspot.com"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── Fallback data (used if Firestore is empty) ────────────
const FALLBACK = [
  {id:'f1',venue:"St Peter's Church fete",city:"Woolton, Liverpool",date:"1957-07-06",lat:53.3739,lng:-2.8742,desc:"John Lennon's skiffle group perform at the church fete where he first met Paul McCartney.",source:"https://www.beatlesbible.com/1957/07/06/the-quarrymen-st-peters-church-fete-woolton/"},
  {id:'f2',venue:"New Clubmoor Hall",city:"Liverpool",date:"1957-11-23",lat:53.4308,lng:-2.9671,desc:"Early Quarrymen performance. Paul McCartney's first appearance with the group on stage.",source:"https://www.beatlesbible.com/1957/11/23/"},
  {id:'f3',venue:"Harry Harrison's wedding",city:"Speke, Liverpool",date:"1958-12-20",lat:53.3477,lng:-2.8495,desc:"The Quarrymen play at George Harrison's brother Harry's wedding reception.",source:"https://www.beatlesbible.com/1958/12/20/"},
  {id:'f4',venue:"Casbah Coffee Club",city:"West Derby, Liverpool",date:"1959-08-29",lat:53.4284,lng:-2.9018,desc:"The opening night of the Casbah Coffee Club, run by Mona Best in her basement.",source:"https://www.beatlesbible.com/1959/08/29/"},
  {id:'f5',venue:"Wyvern Social Club",city:"Seel Street, Liverpool",date:"1960-05-10",lat:53.4007,lng:-2.9773,desc:"The Silver Beetles audition for promoter Larry Parnes, hoping to back Billy Fury on tour.",source:"https://www.beatlesbible.com/1960/05/10/"},
  {id:'f6',venue:"Indra Club",city:"Hamburg",date:"1960-08-17",lat:53.5499,lng:9.9609,desc:"The Beatles begin their first Hamburg residency at the Indra Club on Grosse Freiheit.",source:"https://www.beatlesbible.com/1960/08/17/"},
  {id:'f7',venue:"Kaiserkeller",city:"Hamburg",date:"1960-10-04",lat:53.5497,lng:9.9611,desc:"The Beatles move from the Indra to the larger Kaiserkeller after noise complaints.",source:"https://www.beatlesbible.com/1960/10/04/"},
  {id:'f8',venue:"Hamburg Fairground",city:"Hamburg",date:"1960-11-15",lat:53.5753,lng:10.0153,desc:"Astrid Kirchherr photographs the band at a Hamburg fairground.",source:"https://www.beatlesbible.com/1960/11/15/"},
  {id:'f9',venue:"Top Ten Club",city:"Hamburg",date:"1961-04-01",lat:53.5495,lng:9.9614,desc:"Second Hamburg trip. The band play the Top Ten Club for three months.",source:"https://www.beatlesbible.com/1961/04/01/"},
  {id:'f10',venue:"Friedrich-Ebert-Halle",city:"Hamburg",date:"1961-06-22",lat:53.5024,lng:9.8507,desc:"The Beatles back Tony Sheridan on recordings for Polydor — their first commercial studio session.",source:"https://www.beatlesbible.com/1961/06/22/"},
  {id:'f11',venue:"Cavern Club",city:"Liverpool",date:"1961-09-28",lat:53.4083,lng:-2.9917,desc:"One of hundreds of Cavern Club performances in 1961.",source:"https://www.beatlesbible.com/1961/09/28/"},
  {id:'f12',venue:"Albert Marrion's Studio",city:"Liverpool",date:"1961-12-17",lat:53.4054,lng:-2.9805,desc:"Brian Epstein commissions local wedding photographer Albert Marrion for the band's first professional photo session.",source:"https://www.beatlesbible.com/1961/12/17/beatles-first-photo-session/"},
  {id:'f13',venue:"Decca Studios",city:"London",date:"1962-01-01",lat:51.5468,lng:-0.1836,desc:"The Beatles audition for Decca Records. Decca famously pass, saying 'guitar groups are on the way out.'",source:"https://www.beatlesbible.com/1962/01/01/decca-audition/"},
  {id:'f14',venue:"Star-Club",city:"Hamburg",date:"1962-04-13",lat:53.5501,lng:9.9607,desc:"The Beatles begin their final Hamburg residency at the newly opened Star-Club.",source:"https://www.beatlesbible.com/1962/04/13/"},
  {id:'f15',venue:"Abbey Road Studios",city:"London",date:"1962-06-06",lat:51.5320,lng:-0.1783,desc:"The Beatles record at EMI Studios for the first time. Pete Best is still the drummer.",source:"https://www.beatlesbible.com/1962/06/06/"}
];

// ── State ─────────────────────────────────────────────────
let events = [];
let activeId = null;
let currentPhotoIndex = 0;
let map, markers = {}, editingId = null;
let usingFirestore = false;

// ── Time helpers ──────────────────────────────────────────
const minTs = new Date('1957-01-01').getTime();
const maxTs = new Date('1962-12-31').getTime();

function toTs(d) { return d ? new Date(d).getTime() : 0; }
function tsPct(ts) { return Math.max(0, Math.min(100, (ts - minTs) / (maxTs - minTs) * 100)); }

function formatDate(d) {
  if (!d) return '—';
  const p = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (p.length === 1) return p[0];
  if (p.length === 2) return months[parseInt(p[1])-1] + ' ' + p[0];
  return p[2] + ' ' + months[parseInt(p[1])-1] + ' ' + p[0];
}

// ── Map ───────────────────────────────────────────────────
function makeIcon(isActive) {
  const size = isActive ? 18 : 12;
  const color = isActive ? '#1a1612' : '#b45309';
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);transition:all 0.2s"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function initMap() {
  map = L.map('map', { center: [53.2, 2.0], zoom: 6 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }).addTo(map);
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  events.forEach(p => {
    if (!p.lat || !p.lng) return;
    const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.id === activeId) }).addTo(map);
    m.bindTooltip(eventTitle(p), { direction: 'top', offset: [0, -8] });
    m.on('click', () => selectEvent(p.id));
    markers[p.id] = m;
  });
}

// ── Data helpers ──────────────────────────────────────────
function eventTitle(e) { return e.venue || e.title || '—'; }
function eventLocation(e) { return [e.venue, e.city].filter(Boolean).join(', '); }

// Map a Firestore doc snapshot to the internal event shape
function docToEvent(snapshot) {
  const d = snapshot.data();
  return {
    id: snapshot.id,
    venue: d.venue || '',
    city: d.city || '',
    date: d.date || '',
    time: d.time || '',
    lat: d.lat || 0,
    lng: d.lng || 0,
    desc: d.desc || '',
    source: d.source || '',
    _photosLoaded: false,
    _photos: [],
    _fromFirestore: true
  };
}

// ── Firestore loading ─────────────────────────────────────
async function loadFromFirestore() {
  const snap = await getDocs(collection(db, 'events'));
  if (snap.empty) return null;
  return snap.docs.map(docToEvent);
}

async function loadPhotosForEvent(eventId) {
  const snap = await getDocs(collection(db, 'events', eventId, 'photos'));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// ── Select & display ──────────────────────────────────────
async function selectEvent(id) {
  activeId = id;
  const p = events.find(x => x.id === id);
  if (!p) return;

  // Lazy-load photos from Firestore subcollection
  if (!p._photosLoaded) {
    if (p._fromFirestore) {
      try {
        p._photos = await loadPhotosForEvent(id);
      } catch (e) {
        p._photos = [];
      }
    }
    p._photosLoaded = true;
  }

  showPhoto(p, 0);

  document.getElementById('m-date').textContent = formatDate(p.date);
  document.getElementById('m-title').textContent = eventTitle(p);
  document.getElementById('m-loc').textContent = eventLocation(p);
  document.getElementById('m-desc').textContent = p.desc || '';
  const srcEl = document.getElementById('m-src');
  srcEl.innerHTML = p.source ? `<a href="${p.source}" target="_blank">View source</a>` : '';
  document.getElementById('edit-btn').style.display = 'inline-block';

  const ts = toTs(p.date);
  const pct = tsPct(ts);
  document.getElementById('tl-prog').style.width = pct + '%';
  document.getElementById('tl-thumb').style.left = pct + '%';
  document.getElementById('tl-label').textContent = formatDate(p.date) + ' — ' + eventLocation(p);

  document.querySelectorAll('.entry').forEach(el => el.classList.toggle('active', el.dataset.id === id));

  renderMarkers();
  if (p.lat && p.lng) map.flyTo([p.lat, p.lng], Math.max(map.getZoom(), 9), { animate: true, duration: 0.8 });
}

// ── Photo navigation ──────────────────────────────────────
function showPhoto(p, index) {
  const photos = p._photos || [];
  currentPhotoIndex = Math.max(0, Math.min(index, photos.length - 1));
  const photo = photos[currentPhotoIndex];
  const imgUrl = photo ? (photo.img || '') : '';

  const photoImg     = document.getElementById('photo-img');
  const placeholder  = document.getElementById('photo-placeholder');
  const prevBtn      = document.getElementById('photo-prev');
  const nextBtn      = document.getElementById('photo-next');
  const counter      = document.getElementById('photo-counter');

  if (imgUrl) {
    photoImg.alt = eventTitle(p);
    photoImg.src = imgUrl;
    photoImg.style.display = 'block';
    placeholder.style.display = 'none';
    photoImg.onerror = () => {
      photoImg.style.display = 'none';
      placeholder.textContent = 'Image could not be loaded.';
      placeholder.style.display = 'flex';
    };
  } else {
    photoImg.style.display = 'none';
    placeholder.textContent = 'No image attached to this event';
    placeholder.style.display = 'flex';
  }

  const multi = photos.length > 1;
  prevBtn.style.display  = multi ? 'flex' : 'none';
  nextBtn.style.display  = multi ? 'flex' : 'none';
  counter.style.display  = multi ? 'block' : 'none';
  if (multi) counter.textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
}

document.getElementById('photo-prev').addEventListener('click', () => {
  const p = events.find(x => x.id === activeId);
  if (!p || !p._photos || p._photos.length < 2) return;
  showPhoto(p, (currentPhotoIndex - 1 + p._photos.length) % p._photos.length);
});

document.getElementById('photo-next').addEventListener('click', () => {
  const p = events.find(x => x.id === activeId);
  if (!p || !p._photos || p._photos.length < 2) return;
  showPhoto(p, (currentPhotoIndex + 1) % p._photos.length);
});

// ── Render list & timeline ────────────────────────────────
function renderList() {
  const sorted = [...events].sort((a, b) => toTs(a.date) - toTs(b.date));
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('count').textContent = events.length;
  sorted.forEach(p => {
    const div = document.createElement('div');
    div.className = 'entry' + (p.id === activeId ? ' active' : '');
    div.dataset.id = p.id;
    div.innerHTML = `
      <div class="e-date">${p.date || '?'}</div>
      <div>
        <div class="e-title">${eventTitle(p)}</div>
        <div class="e-loc">${eventLocation(p)}</div>
      </div>`;
    div.addEventListener('click', () => selectEvent(p.id));
    list.appendChild(div);
  });
}

function renderPips() {
  document.querySelectorAll('.tl-pip').forEach(e => e.remove());
  const wrap = document.getElementById('tl-wrap');
  events.forEach(p => {
    if (!p.date) return;
    const pct = tsPct(toTs(p.date));
    const pip = document.createElement('div');
    pip.className = 'tl-pip' + (p.id === activeId ? ' active' : '');
    pip.style.left = pct + '%';
    pip.title = eventTitle(p);
    pip.addEventListener('click', () => selectEvent(p.id));
    wrap.appendChild(pip);
  });
}

function render() {
  renderList();
  renderMarkers();
  renderPips();
}

// ── Edit form ─────────────────────────────────────────────
function openEdit(id) {
  editingId = id;
  const p = events.find(x => x.id === id);
  if (!p) return;
  document.getElementById('ef-title').value = p.venue || '';
  document.getElementById('ef-date').value = p.date || '';
  document.getElementById('ef-loc').value = p.city || '';
  document.getElementById('ef-lat').value = p.lat || '';
  document.getElementById('ef-lng').value = p.lng || '';
  document.getElementById('ef-img').value = (p._photos && p._photos[0]) ? p._photos[0].img : '';
  document.getElementById('ef-src').value = p.source || '';
  document.getElementById('ef-desc').value = p.desc || '';
  document.getElementById('json-export').style.display = 'none';
  document.getElementById('edit-overlay').classList.add('open');
}

document.getElementById('edit-btn').addEventListener('click', () => openEdit(activeId));
document.getElementById('cancel-btn').addEventListener('click', () => {
  document.getElementById('edit-overlay').classList.remove('open');
});
document.getElementById('edit-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-overlay'))
    document.getElementById('edit-overlay').classList.remove('open');
});

document.getElementById('save-btn').addEventListener('click', async () => {
  const p = events.find(x => x.id === editingId);
  if (!p) return;

  const updates = {
    venue: document.getElementById('ef-title').value,
    date: document.getElementById('ef-date').value,
    city: document.getElementById('ef-loc').value,
    lat: parseFloat(document.getElementById('ef-lat').value) || p.lat,
    lng: parseFloat(document.getElementById('ef-lng').value) || p.lng,
    source: document.getElementById('ef-src').value,
    desc: document.getElementById('ef-desc').value
  };

  Object.assign(p, updates);

  const saveBtn = document.getElementById('save-btn');
  saveBtn.textContent = 'Saving…';
  saveBtn.disabled = true;

  if (p._fromFirestore) {
    try {
      await updateDoc(doc(db, 'events', p.id), updates);
      document.getElementById('json-export').style.display = 'none';
      document.getElementById('edit-overlay').classList.remove('open');
    } catch (err) {
      alert('Firestore save failed: ' + err.message);
    }
  } else {
    // Fallback data — show JSON export
    const exportEl = document.getElementById('json-export');
    document.getElementById('json-out').value = JSON.stringify(events, null, 2);
    exportEl.style.display = 'block';
  }

  saveBtn.textContent = 'Save';
  saveBtn.disabled = false;

  render();
  selectEvent(editingId);
});

// ── Boot ──────────────────────────────────────────────────
initMap();

const badge = document.getElementById('data-badge');
try {
  const data = await loadFromFirestore();
  if (data && data.length > 0) {
    events = data;
    usingFirestore = true;
    badge.textContent = 'Firestore';
    badge.style.background = '#dcfce7';
    badge.style.color = '#166534';
    badge.style.borderColor = '#86efac';
  } else {
    events = FALLBACK.map(p => ({ ...p, _photosLoaded: true, _fromFirestore: false }));
    badge.textContent = 'provisional data';
  }
} catch (err) {
  console.error('Firestore error:', err);
  events = FALLBACK.map(p => ({ ...p, _photosLoaded: true, _fromFirestore: false }));
  badge.textContent = 'offline / fallback';
}

render();
if (events.length) selectEvent(events[0].id);
</script>
</body>
